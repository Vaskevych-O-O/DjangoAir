services:
  # 1. Redis як приватний сервіс (безкоштовно)
  - type: pserv
    name: django-air-redis
    runtime: docker
    image: redis:7
    plan: free # Перевір доступність free для pserv у своєму регіоні, або використовуй standard
    envVars:
      - key: PORT
        value: 6379

  # 2. Django Web Service
  - type: web
    name: django-air-web
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: django-air-db
          property: connectionString
      - key: CELERY_BROKER_URL
        value: redis://django-air-redis:6379/0
      - key: CELERY_RESULT_BACKEND
        value: redis://django-air-redis:6379/0
      # Додай сюди інші змінні з .env

  # 3. Celery Worker
  - type: worker
    name: django-air-worker
    runtime: docker
    dockerCommand: celery -A air worker --loglevel=info --pool=solo
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: django-air-db
          property: connectionString
      - key: CELERY_BROKER_URL
        value: redis://django-air-redis:6379/0

# 4. База даних (це працює через blueprint)
databases:
  - name: django-air-db
    plan: free